<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zona Verde - O que fazer?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        :root { --heat-opacity: 0.12; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; overscroll-behavior: none; touch-action: manipulation; -webkit-touch-callout: none; user-select: none; }
        body { font-family: 'Varela Round', sans-serif; text-align: center; background-color: #f4fcf4; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { max-width: 980px; width: 94vw; margin: auto; display: flex; flex-direction: column; align-items: center; padding: 24px 0; }
        h1 { color: #008A00; font-size: 28px; margin-bottom: 30px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); white-space: pre-line; }
        
        .area-interativa { display: flex; width: 100%; justify-content: center; align-items: stretch; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .container-botoes { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; max-width: 620px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .acao { --heat-opacity: 0.12; flex: 1 1 calc(50% - 15px); max-width: calc(50% - 15px); height: 132px; border-radius: 25px; color: #333; font-size: 18px; font-weight: bold; cursor: pointer; border: 4px solid white; background: linear-gradient(145deg, #cce5cc, #a8d1a8); box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 0 0 12px rgba(255,255,255,var(--heat-opacity)); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; box-sizing: border-box; padding: 10px; }
        
        .icone-botao { width: 65px; height: 65px; object-fit: contain; margin-bottom: 10px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .acao span { font-size: 45px; margin-bottom: 10px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); } 
        
        .acao:active { transform: scale(0.95); }
        .acao.oculto { flex: 0 0 0%; max-width: 0; height: 0; padding: 0; margin: 0; border-width: 0; opacity: 0; transform: scale(0.8); pointer-events: none; }
        
        .acao.selecionado { flex: 1 1 100%; max-width: 100%; height: 350px; transform: scale(1.02); pointer-events: none; box-shadow: 0 12px 26px rgba(0,0,0,0.16); font-size: 26px; }
        .acao.selecionado .icone-botao { width: 130px; height: 130px; margin-bottom: 20px; }
        .acao.selecionado span { font-size: 85px; margin-bottom: 20px; }
        
        .painel-feedback { width: 0; opacity: 0; padding: 0; margin-left: 0; overflow: hidden; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; border-left: 0 solid #f0fdf0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .gif-recompensa { width: 200px; height: 200px; object-fit: contain; border-radius: 20px; margin-bottom: 15px; }
        .texto-feedback { color: #008A00; font-size: 22px; font-weight: bold; margin: 0 10px 15px 10px; }
        
        .timer-container { width: 80%; height: 12px; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .timer-barra { width: 100%; height: 100%; background-color: #008A00; transition: width 8s linear; }

        .area-interativa.modo-foco .container-botoes { width: 35%; max-width: 300px; }
        .area-interativa.modo-foco .painel-feedback { width: 60%; opacity: 1; padding: 25px; margin-left: 20px; border-left: 8px solid #a8d1a8; }
        
        .controles { margin-top: 30px; display: flex; gap: 15px; }
        .btn-controle { padding: 12px 30px; border-radius: 25px; background-color: #e0e0e0; color: #555; border: 3px solid white; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .btn-controle:active { transform: scale(0.95); }
        .titulo-oculto { opacity: 0; height: 0; margin: 0; overflow: hidden; }

        #cadeado { position: fixed; top: 18px; right: 24px; background-color: rgba(0, 0, 0, 0.05); color: #666; padding: 12px 20px; border-radius: 20px; font-size: 15px; font-weight: bold; cursor: pointer; z-index: 100; }
        #modal-admin { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.72); z-index: 9999; justify-content: center; align-items: center; }
        .admin-content { background: white; padding: 25px; border-radius: 20px; width: min(760px, 92vw); text-align: left; max-height: 88vh; overflow-y: auto; box-sizing: border-box; }
        .admin-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
        .admin-block { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 18px; padding: 18px; }
        .admin-content h2 { color: #008A00; margin-top: 0; font-size: 20px; }
        .admin-content p { color: #555; font-size: 14px; margin-bottom: 15px; margin-top: 0; }
        .admin-content input, .admin-content textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; box-sizing: border-box; font-size: 15px; }
        .admin-content textarea { resize: none; height: 70px; }
        .heatmap-panel { display: flex; flex-direction: column; gap: 10px; }
        .heatmap-row { display: grid; grid-template-columns: minmax(120px, 1fr) auto; gap: 10px; align-items: center; }
        .heatmap-label, .heatmap-value { font-size: 14px; color: #4a5568; }
        .heatmap-bar { grid-column: 1 / -1; width: 100%; height: 10px; background: #e6edf5; border-radius: 999px; overflow: hidden; }
        .heatmap-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #cce5cc, #a8d1a8); }
        .heatmap-empty { margin: 0; color: #718096; }
        .btn-salvar, .btn-apagar, .btn-cancelar { border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
        .btn-salvar { background: #008A00; color: white; }
        .btn-apagar { background: #d32f2f; color: white; }
        .btn-cancelar { background: #e0e0e0; color: #333; }

        @media (max-width: 768px) {
            h1 { font-size: 22px; margin-bottom: 20px; margin-top: 40px; }
            .container-botoes { gap: 10px; }
            .acao { height: 100px; font-size: 14px; flex: 1 1 calc(50% - 10px); max-width: calc(50% - 10px); }
            .icone-botao { width: 45px; height: 45px; }
            .acao span { font-size: 35px; margin-bottom: 5px; }
            
            .acao.selecionado { height: 180px; font-size: 22px; }
            .acao.selecionado .icone-botao { width: 80px; height: 80px; }
            .acao.selecionado span { font-size: 55px; margin-bottom: 10px; }
            
            .area-interativa { flex-direction: column; align-items: center; }
            .area-interativa.modo-foco .container-botoes { width: 100%; max-width: 100%; margin-bottom: 20px; }
            .area-interativa.modo-foco .painel-feedback { width: 100%; margin-left: 0; padding: 20px; border-left: none; border-top: 8px solid #a8d1a8; }
            .gif-recompensa { width: 140px; height: 140px; }
            .texto-feedback { font-size: 18px; }
            #cadeado { font-size: 12px; padding: 8px 12px; top: 10px; right: 10px; }
            .admin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="cadeado" onclick="abrirAdmin()">Área Oculta 🔒</div>
    
    <div id="modal-admin">
        <div class="admin-content">
            <div class="admin-grid">
                <div class="admin-block">
                    <h2>Nova Ação (Crianças)</h2>
                    <p>Adicione um botão personalizado para a sua turma.</p>
                    <input type="text" id="input-emoji" placeholder="Emoji (ex: 🧩)">
                    <input type="text" id="input-nome" placeholder="Nome do botão (ex: Montar peças)">
                    <input type="text" id="input-texto-visual" placeholder="Texto para a tela (ex: Que legal! Vamos montar!)">
                    
                    <button class="btn-salvar" onclick="salvarAcaoPersonalizada()">Salvar Botão</button>
                    <button class="btn-apagar" id="btn-remover-custom" style="display: none;" onclick="apagarAcaoPersonalizada()">Remover Botão</button>
                    <button class="btn-cancelar" onclick="fecharAdmin()">Fechar</button>
                </div>
                
                <div class="admin-block">
                    <div class="heatmap-panel" id="heatmap-acoes"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="app-container">
        <h1 id="titulo-principal">Você está na Zona Verde 😊<br>O que você quer fazer?</h1>
        
        <div class="area-interativa" id="area-interativa">
            <div class="container-botoes" id="grid-botoes">
                <button class="acao" data-heat-key="verde:ler" onclick="selecionarAcao('ler', this)">
                    <img src="/imagens/zona_verde/ler.png" class="icone-botao" alt="Ler">Ler um livro
                </button>
                <button class="acao" data-heat-key="verde:tarefa" onclick="selecionarAcao('tarefa', this)">
                    <img src="/imagens/zona_verde/atividade.png" class="icone-botao" alt="Tarefa">Fazer a tarefa
                </button>
                <button class="acao" data-heat-key="verde:ajudar" onclick="selecionarAcao('ajudar', this)">
                    <img src="/imagens/zona_verde/professor.png" class="icone-botao" alt="Ajudar">Ajudar o professor
                </button>
                <button class="acao" data-heat-key="verde:comer" onclick="selecionarAcao('comer', this)">
                    <img src="/imagens/zona_verde/comer.png" class="icone-botao" alt="Comer">Comer algo
                </button>
                <button class="acao" data-heat-key="verde:brincar" onclick="selecionarAcao('brincar', this)">
                    <img src="/imagens/zona_verde/brincar.png" class="icone-botao" alt="Brincar">Brincar com amigo
                </button>
                <button class="acao" data-heat-key="verde:tablet" onclick="selecionarAcao('tablet', this)">
                    <img src="/imagens/zona_verde/jogar no tablet.png" class="icone-botao" alt="Tablet">Jogar no tablet
                </button>
            </div>
            
            <div class="painel-feedback" id="painel-mediador">
                <img src="" id="gif-recompensa" class="gif-recompensa" alt="Imagem Legal">
                <div class="texto-feedback" id="texto-feedback">Muito bem!</div>
                <div class="timer-container">
                    <div class="timer-barra" id="timer-barra"></div>
                </div>
            </div>
        </div>
        
        <div class="controles">
            <button class="btn-controle" id="btn-voltar" onclick="acaoVoltar()" style="opacity: 0.3;">⬅ Voltar mais cedo</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const ZONA = 'verde';
        const STORAGE_KEY = 'custom_verde';
        let timerReset;
        let audioAtual = null;
        
        const orientacoes = {
            "tarefa": {
                "label": "Fazer a tarefa",
                "textoVisual": "Muito bem! Vamos fazer a tarefa com bastante capricho!",
                "audio": "/audios/zona_verde/Tarefa.m4a",
                "imagem": "/imagens/zona_verde/atividade.png"
            },
            "comer": {
                "label": "Comer algo",
                "textoVisual": "Que delícia! Hora de um lanchinho bem gostoso!",
                "audio": "/audios/zona_verde/Comer_algo.m4a",
                "imagem": "/imagens/zona_verde/comer.png" 
            },
            "ajudar": {
                "label": "Ajudar o professor",
                "textoVisual": "Você é um ótimo ajudante! O professor vai adorar.",
                "audio": "/audios/zona_verde/Ajudar_professor.m4a",
                "imagem": "/imagens/zona_verde/professor.png" 
            },
            "tablet": {
                "label": "Jogar no tablet",
                "textoVisual": "Hora da diversão! Vamos jogar um pouco.",
                "audio": "/audios/zona_verde/Jogar_tablet.m4a",
                "imagem": "/imagens/zona_verde/jogar no tablet.png" 
            },
            "brincar": {
                "label": "Brincar com amigo",
                "textoVisual": "Que legal! Chame seu amigo para brincarem juntos!",
                "audio": "/audios/zona_verde/Brincar.m4a",
                "imagem": "/imagens/zona_verde/brincar.png" 
            },
            "ler": {
                "label": "Ler um livro",
                "textoVisual": "Excelente escolha! Uma boa história faz a gente viajar.",
                "audio": "/audios/zona_verde/Ler_livro.m4a",
                "imagem": "/imagens/zona_verde/ler.png" 
            }
        };
        
        let modoFocoAtivo = false;

        function criarBotaoAcao(chave, emoji, nome) {
            const btn = document.createElement('button');
            btn.className = 'acao';
            btn.dataset.heatKey = ZONA + ':' + chave;
            btn.onclick = function () { selecionarAcao(chave, btn); };
            
            const icone = document.createElement('span');
            icone.textContent = emoji;
            
            btn.appendChild(icone);
            btn.append(nome);
            return btn;
        }

        function tocarAudio(caminhoArquivo) {
            if (audioAtual) {
                audioAtual.pause();
                audioAtual.currentTime = 0;
            }
            audioAtual = new Audio(caminhoArquivo);
            audioAtual.play().catch(erro => console.error("Erro ao reproduzir o áudio:", erro));
        }

        function renderizarHeatmapZona() {
            if (typeof RegulaMenteApp === 'undefined') return;
            const entradas = RegulaMenteApp.getHeatmapEntries('acoes', (item) => item.key.startsWith(ZONA + ':'));
            RegulaMenteApp.renderHeatmapList(document.getElementById('heatmap-acoes'), entradas, {
                title: 'Cliques das Crianças',
                emptyText: 'Os dados do seu TCC aparecerão aqui.'
            });
        }

        function aplicarHeatmapAcoes() {
            if (typeof RegulaMenteApp === 'undefined') return;
            RegulaMenteApp.applyUsageHeat(
                document.getElementById('grid-botoes'), 
                'acoes', 
                (element) => element.dataset.heatKey, 
                (item) => item.key.startsWith(ZONA + ':')
            );
        }

        function carregarPersonalizado() {
            const salvo = localStorage.getItem(STORAGE_KEY);
            const existente = document.getElementById('acao-custom');
            if (existente) existente.remove();
            
            if (salvo) {
                const dados = JSON.parse(salvo);
                orientacoes.custom = {
                    label: dados.nome,
                    textoVisual: dados.textoVisual || "Ótima escolha!",
                    audio: "/audios/zona_verde/Customizado.m4a", 
                    imagem: "/imagens/zona_verde/atividade.png" 
                };
                
                const btn = criarBotaoAcao('custom', dados.emoji, dados.nome);
                btn.id = 'acao-custom';
                document.getElementById('grid-botoes').appendChild(btn);
                document.getElementById('btn-remover-custom').style.display = 'block';
            } else {
                delete orientacoes.custom;
                document.getElementById('btn-remover-custom').style.display = 'none';
            }
            
            aplicarHeatmapAcoes();
            renderizarHeatmapZona();
        }

        window.addEventListener("load", carregarPersonalizado);

        function abrirAdmin() {
            if (typeof RegulaMenteApp !== 'undefined' && !RegulaMenteApp.promptForMediatorPin()) {
                alert('PIN incorreto.');
                return;
            } else if (typeof RegulaMenteApp === 'undefined') {
                if(prompt("PIN de Acesso:") !== "1234") return;
            }
            
            document.getElementById('modal-admin').style.display = 'flex';
            const salvo = localStorage.getItem(STORAGE_KEY);
            
            if (salvo) {
                const dados = JSON.parse(salvo);
                document.getElementById('input-emoji').value = dados.emoji;
                document.getElementById('input-nome').value = dados.nome;
                document.getElementById('input-texto-visual').value = dados.textoVisual || "";
            }
            renderizarHeatmapZona();
        }

        function fecharAdmin() {
            document.getElementById('modal-admin').style.display = 'none';
        }

        function salvarAcaoPersonalizada() {
            const emoji = document.getElementById('input-emoji').value.trim();
            const nome = document.getElementById('input-nome').value.trim();
            const textoVisual = document.getElementById('input-texto-visual').value.trim();
            
            if (!nome || !emoji) {
                alert('Preencha pelo menos o Emoji e o Nome!');
                return;
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ emoji, nome, textoVisual }));
            fecharAdmin();
            carregarPersonalizado();
        }

        function apagarAcaoPersonalizada() {
            if (confirm('Tem certeza que deseja apagar o botão personalizado?')) {
                localStorage.removeItem(STORAGE_KEY);
                fecharAdmin();
                carregarPersonalizado();
            }
        }

        function selecionarAcao(chave, botaoClicado) {
            const orientacao = orientacoes[chave];
            if (!orientacao) return;
            
            modoFocoAtivo = true;
            clearTimeout(timerReset); 
            
            if (typeof RegulaMenteApp !== 'undefined') {
                RegulaMenteApp.trackHeatmap('acoes', ZONA + ':' + chave, {
                    label: orientacao.label,
                    page: 'acoes_' + ZONA,
                    zona: ZONA,
                });
            }
            
            document.getElementById('titulo-principal').classList.add('titulo-oculto');
            document.getElementById('area-interativa').classList.add('modo-foco');
            
            document.querySelectorAll('.acao').forEach((botao) => {
                if (botao === botaoClicado) {
                    botao.classList.add('selecionado');
                    botao.classList.remove('oculto');
                } else {
                    botao.classList.add('oculto');
                    botao.classList.remove('selecionado');
                }
            });
            
            document.getElementById('texto-feedback').textContent = orientacao.textoVisual;
            document.getElementById('gif-recompensa').src = orientacao.imagem;
            tocarAudio(orientacao.audio);
            
            const barra = document.getElementById('timer-barra');
            barra.style.transition = 'none';
            barra.style.width = '100%'; 
            
            // Corrige o bug do tempo dinâmico garantindo fallback seguro para 8s
            const tempoDaAcao = orientacao.tempoEspera || 8000;
            
            setTimeout(() => {
                barra.style.transition = `width ${tempoDaAcao / 1000}s linear`; 
                barra.style.width = '0%'; 
            }, 50);
            
            timerReset = setTimeout(() => {
                window.location.href = 'principal.html';
            }, tempoDaAcao); 
        }

        function acaoVoltar() {
            clearTimeout(timerReset); 
            if (audioAtual) audioAtual.pause(); 

            if (modoFocoAtivo) {
                modoFocoAtivo = false;
                document.getElementById('titulo-principal').classList.remove('titulo-oculto');
                document.getElementById('area-interativa').classList.remove('modo-foco');
                
                document.querySelectorAll('.acao').forEach((botao) => {
                    botao.classList.remove('oculto');
                    botao.classList.remove('selecionado');
                });
            } else {
                window.location.href = 'principal.html';
            }
        }
    </script>
</body>
</html>
