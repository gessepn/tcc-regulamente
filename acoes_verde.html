<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zona Verde - O que fazer?</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        :root { --heat-opacity: 0.12; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; overscroll-behavior: none; touch-action: manipulation; -webkit-touch-callout: none; user-select: none; }
        body { font-family: 'Varela Round', sans-serif; text-align: center; background-color: #f4fcf4; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { max-width: 980px; width: 94vw; margin: auto; display: flex; flex-direction: column; align-items: center; padding: 24px 0; }
        h1 { color: #008A00; font-size: 28px; margin-bottom: 30px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); white-space: pre-line; }
        
        .area-interativa { display: flex; width: 100%; justify-content: center; align-items: stretch; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .container-botoes { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; max-width: 620px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .acao { --heat-opacity: 0.12; flex: 1 1 calc(50% - 15px); max-width: calc(50% - 15px); height: 132px; border-radius: 25px; color: #333; font-size: 18px; font-weight: bold; cursor: pointer; border: 4px solid white; background: linear-gradient(145deg, #cce5cc, #a8d1a8); box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 0 0 12px rgba(255,255,255,var(--heat-opacity)); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; box-sizing: border-box; padding: 10px; }
        
        .icone-botao { width: 65px; height: 65px; object-fit: contain; margin-bottom: 10px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .acao:active { transform: scale(0.95); }
        .acao.oculto { flex: 0 0 0%; max-width: 0; height: 0; padding: 0; margin: 0; border-width: 0; opacity: 0; transform: scale(0.8); pointer-events: none; }
        
        .acao.selecionado { flex: 1 1 100%; max-width: 100%; height: 350px; transform: scale(1.02); pointer-events: none; box-shadow: 0 12px 26px rgba(0,0,0,0.16); font-size: 26px; }
        .acao.selecionado .icone-botao { width: 130px; height: 130px; margin-bottom: 20px; }
        
        .painel-feedback { width: 0; opacity: 0; padding: 0; margin-left: 0; overflow: hidden; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; border-left: 0 solid #f0fdf0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .gif-recompensa { width: 200px; height: 200px; object-fit: contain; border-radius: 20px; margin-bottom: 15px; }
        .texto-feedback { color: #008A00; font-size: 22px; font-weight: bold; margin: 0 10px 15px 10px; }
        
        .timer-container { width: 80%; height: 12px; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .timer-barra { width: 100%; height: 100%; background-color: #008A00; transition: width 4s linear; }

        .area-interativa.modo-foco .container-botoes { width: 35%; max-width: 300px; }
        .area-interativa.modo-foco .painel-feedback { width: 60%; opacity: 1; padding: 25px; margin-left: 20px; border-left: 8px solid #a8d1a8; }
        
        .controles { margin-top: 30px; display: flex; gap: 15px; }
        .btn-controle { padding: 12px 30px; border-radius: 25px; background-color: #e0e0e0; color: #555; border: 3px solid white; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .titulo-oculto { opacity: 0; height: 0; margin: 0; overflow: hidden; }
        #cadeado { position: fixed; top: 18px; right: 24px; background-color: rgba(0, 0, 0, 0.05); color: #666; padding: 12px 20px; border-radius: 20px; font-size: 15px; font-weight: bold; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <div id="cadeado" onclick="acaoVoltar()">⬅ Voltar 🔒</div>
    
    <div class="app-container">
        <h1 id="titulo-principal">VOCÊ ESTÁ NA ZONA VERDE<br>CALMO, FELIZ OU CONCENTRADO?<br>O QUE VOCÊ QUER FAZER?</h1>
        
        <div class="area-interativa" id="area-interativa">
            <div class="container-botoes" id="grid-botoes">
                <button class="acao" onclick="selecionarAcao('ler', this)">
                    <img src="imagens/zona_verde/ler.png" class="icone-botao" alt="Ler">LER UM LIVRO
                </button>
                <button class="acao" onclick="selecionarAcao('tarefa', this)">
                    <img src="imagens/zona_verde/atividade.png" class="icone-botao" alt="Tarefa">FAZER A TAREFA
                </button>
                <button class="acao" onclick="selecionarAcao('ajudar', this)">
                    <img src="imagens/zona_verde/professor.png" class="icone-botao" alt="Ajudar">AJUDAR O PROFESSOR
                </button>
                <button class="acao" onclick="selecionarAcao('comer', this)">
                    <img src="imagens/zona_verde/comer.png" class="icone-botao" alt="Comer">COMER ALGO
                </button>
                <button class="acao" onclick="selecionarAcao('brincar', this)">
                    <img src="imagens/zona_verde/brincar.png" class="icone-botao" alt="Brincar">BRINCAR COM AMIGO
                </button>
                <button class="acao" onclick="selecionarAcao('tablet', this)">
                    <img src="imagens/zona_verde/jogar_no_tablet.png" class="icone-botao" alt="Tablet">JOGAR NO TABLET
                </button>
            </div> 
            
            <div class="painel-feedback" id="painel-mediador">
                <img src="" id="gif-recompensa" class="gif-recompensa" alt="Imagem">
                <div class="texto-feedback" id="texto-feedback">Muito bem!</div>
                <div class="timer-container">
                    <div class="timer-barra" id="timer-barra"></div>
                </div>
            </div>
        </div>
        
        <div class="controles">
            <button class="btn-controle" id="btn-voltar-manual" onclick="acaoVoltar()" style="opacity: 0.6;">⬅ Início</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const ZONA = 'Verde';
        let timerReset;
        let audioAtual = null;
        
        const orientacoes = {
            "tarefa": {
                "label": "Fazer a tarefa",
                "textoVisual": "MUITO BEM! VAMOS FAZER A TAREFA COM CAPRICO!",
                "audio": "audios/zona_verde/tarefa.m4a",
                "imagem": "imagens/zona_verde/atividade.png"
            },
            "comer": {
                "label": "Comer algo",
                "textoVisual": "QUE DELÍCIA! HORA DE UM LANCHINHO!",
                "audio": "audios/zona_verde/comer_algo.m4a",
                "imagem": "imagens/zona_verde/comer.png" 
            },
            "ajudar": {
                "label": "Ajudar o professor",
                "textoVisual": "VOCÊ É UM ÓTIMO AJUDANTE!",
                "audio": "audios/zona_verde/ajudar_professor.m4a",
                "imagem": "imagens/zona_verde/professor.png" 
            },
            "tablet": {
                "label": "Jogar no tablet",
                "textoVisual": "HORA DA DIVERSÃO! VAMOS JOGAR UM POUCO.",
                "audio": "audios/zona_verde/jogar_tablet.m4a",
                "imagem": "imagens/zona_verde/jogar_no_tablet.png" 
            },
            "brincar": {
                "label": "Brincar com amigo",
                "textoVisual": "QUE LEGAL! VAMOS BRINCAR JUNTOS!",
                "audio": "audios/zona_verde/brincar.m4a",
                "imagem": "imagens/zona_verde/brincar.png" 
            },
            "ler": {
                "label": "Ler um livro",
                "textoVisual": "EXCELENTE ESCOLHA! BOA LEITURA.",
                "audio": "audios/zona_verde/ler_livro.m4a",
                "imagem": "imagens/zona_verde/ler.png" 
            }
        };

        function tocarAudio(caminhoArquivo) {
            if (audioAtual) {
                audioAtual.pause();
                audioAtual.currentTime = 0;
            }
            audioAtual = new Audio(caminhoArquivo);
            audioAtual.play().catch(erro => console.error("Erro no áudio:", erro));
        }

        function selecionarAcao(chave, botaoClicado) {
            const orientacao = orientacoes[chave];
            if (!orientacao) return;
            
            
            if (typeof registrarUsoEstrategia === 'function') {
                registrarUsoEstrategia(orientacao.label);
            }
            
            
            document.getElementById('titulo-principal').classList.add('titulo-oculto');
            document.getElementById('area-interativa').classList.add('modo-foco');
            
            document.querySelectorAll('.acao').forEach((botao) => {
                if (botao === botaoClicado) {
                    botao.classList.add('selecionado');
                } else {
                    botao.classList.add('oculto');
                }
            });
            
            document.getElementById('texto-feedback').textContent = orientacao.textoVisual;
            document.getElementById('gif-recompensa').src = orientacao.imagem;
            tocarAudio(orientacao.audio);
            
            
            const barra = document.getElementById('timer-barra');
            barra.style.transition = 'none';
            barra.style.width = '100%'; 
            
            setTimeout(() => {
                barra.style.transition = 'width 4.58s linear'; 
                barra.style.width = '0%'; 
            }, 50);
            
            timerReset = setTimeout(() => {
                window.location.assign('principal.html');
            }, 4580); 
        }

        function acaoVoltar() {
            clearTimeout(timerReset); 
            if (audioAtual) audioAtual.pause(); 
            window.location.assign('principal.html');
        }
    </script>
</body>
</html>
