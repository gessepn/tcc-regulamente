<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zona Amarela - O que pode ajudar?</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        :root { --heat-opacity: 0.12; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; overscroll-behavior: none; touch-action: manipulation; -webkit-touch-callout: none; user-select: none; }
        body { font-family: 'Varela Round', sans-serif; text-align: center; background-color: #fefdf0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { max-width: 980px; width: 94vw; margin: auto; display: flex; flex-direction: column; align-items: center; padding: 24px 0; }
        h1 { color: #b29500; font-size: 28px; margin-bottom: 30px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); white-space: pre-line; }
        
        .area-interativa { display: flex; width: 100%; justify-content: center; align-items: stretch; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .container-botoes { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; max-width: 620px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .acao { --heat-opacity: 0.12; flex: 1 1 calc(50% - 15px); max-width: calc(50% - 15px); height: 132px; border-radius: 25px; color: #333; font-size: 18px; font-weight: bold; cursor: pointer; border: 4px solid white; background: linear-gradient(145deg, #fdfd96, #efef75); box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 0 0 12px rgba(255,255,255,var(--heat-opacity)); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; box-sizing: border-box; padding: 10px; }
        
        .icone-botao { width: 65px; height: 65px; object-fit: contain; margin-bottom: 10px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .acao:active { transform: scale(0.95); }
        .acao.oculto { flex: 0 0 0%; max-width: 0; height: 0; padding: 0; margin: 0; border-width: 0; opacity: 0; transform: scale(0.8); pointer-events: none; }
        
        .acao.selecionado { flex: 1 1 100%; max-width: 100%; height: 350px; transform: scale(1.02); pointer-events: none; box-shadow: 0 12px 26px rgba(0,0,0,0.16); font-size: 26px; }
        .acao.selecionado .icone-botao { width: 130px; height: 130px; margin-bottom: 20px; }
        
        .painel-feedback { width: 0; opacity: 0; padding: 0; margin-left: 0; overflow: hidden; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; border-left: 0 solid #fffde6; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .gif-recompensa { width: 200px; height: 200px; object-fit: contain; border-radius: 20px; margin-bottom: 15px; }
        .texto-feedback { color: #b29500; font-size: 22px; font-weight: bold; margin: 0 10px 15px 10px; }
        
        .timer-container { width: 80%; height: 12px; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .timer-barra { width: 100%; height: 100%; background-color: #b29500; transition: width 8s linear; }

        .area-interativa.modo-foco .container-botoes { width: 35%; max-width: 300px; }
        .area-interativa.modo-foco .painel-feedback { width: 60%; opacity: 1; padding: 25px; margin-left: 20px; border-left: 8px solid #efef75; }
        
        .controles { margin-top: 30px; display: flex; gap: 15px; }
        .btn-controle { padding: 12px 30px; border-radius: 25px; background-color: #e0e0e0; color: #555; border: 3px solid white; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        #cadeado { position: fixed; top: 18px; right: 24px; background-color: rgba(0, 0, 0, 0.05); color: #666; padding: 12px 20px; border-radius: 20px; font-size: 15px; font-weight: bold; cursor: pointer; z-index: 100; display: flex; align-items: center; gap: 8px; }
        .icone-voltar { width: 22px; height: 22px; object-fit: contain; }
        .titulo-oculto { opacity: 0; height: 0; margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="cadeado" onclick="acaoVoltar()"><img src="imagens/icones/seta-para-a-esquerda.png" class="icone-voltar" alt="">Voltar</div>
    
    <div class="app-container">
        <h1 id="titulo-principal">VOCÊ ESTÁ NA ZONA AMARELA<br>PREOCUPADO, ANSIOSO OU FRUSTRADO?<br>O QUE AJUDA A ACALMAR?</h1>
        
        <div class="area-interativa" id="area-interativa">
            <div class="container-botoes" id="grid-botoes">
                <button class="acao" onclick="selecionarAcao('apertar', this)">
                    <img src="imagens/zona_amarela/apertar.png" class="icone-botao" alt="Apertar">APERTAR ALGO
                </button>
                <button class="acao" onclick="selecionarAcao('brinquedo', this)">
                    <img src="imagens/zona_amarela/brinquedo.png" class="icone-botao" alt="Brinquedo">BRINQUEDO
                </button>
                <button class="acao" onclick="selecionarAcao('pausa', this)">
                    <img src="imagens/zona_amarela/botao_de_pausa.png" class="icone-botao" alt="Pausa">PAUSA RÁPIDA
                </button>
                <button class="acao" onclick="selecionarAcao('agua', this)">
                    <img src="imagens/zona_amarela/beber.png" class="icone-botao" alt="Água">BEBER ÁGUA
                </button>
                <button class="acao" onclick="selecionarAcao('caminhar', this)">
                    <img src="imagens/zona_amarela/caminhar.png" class="icone-botao" alt="Caminhar">CAMINHAR
                </button>
                <button class="acao" onclick="selecionarAcao('contar', this)">
                    <img src="imagens/zona_amarela/contar.png" class="icone-botao" alt="Contar">CONTAR ATÉ 3
                </button>
            </div>
            
            <div class="painel-feedback" id="painel-mediador">
                <img src="" id="gif-recompensa" class="gif-recompensa" alt="Ação">
                <div class="texto-feedback" id="texto-feedback">MUITO BEM!</div>
                <div class="timer-container">
                    <div class="timer-barra" id="timer-barra"></div>
                </div>
            </div>
        </div>
        
        <div class="controles">
            <button class="btn-controle" id="btn-voltar-manual" onclick="acaoVoltar()" style="opacity: 0.6;">INÍCIO</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const ZONA = 'Amarela';
        let timerReset;
        let audioAtual = null;
        
        const orientacoes = {
            "apertar": {
                "label": "Apertar algo",
                "textoVisual": "PODE APERTAR A MASSINHA BEM FORTE.",
                "audio": "audios/zona_amarela/apertar.m4a",
                "imagem": "imagens/zona_amarela/apertar.png"
            },
            "brinquedo": {
                "label": "Brinquedo",
                "textoVisual": "PODE PEGAR O SEU BRINQUEDO.",
                "audio": "audios/zona_amarela/brinquedo.m4a",
                "imagem": "imagens/zona_amarela/brinquedo.png" 
            },
            "caminhar": {
                "label": "Caminhar",
                "textoVisual": "VAMOS CAMINHAR UM POUCO.",
                "audio": "audios/zona_amarela/caminhar.m4a",
                "imagem": "imagens/zona_amarela/caminhar.png" 
            },
            "pausa": {
                "label": "Pausa rápida",
                "textoVisual": "PAUSA RÁPIDA. PODE SENTAR E RESPIRAR.",
                "audio": "audios/zona_amarela/pausa.m4a",
                "imagem": "imagens/zona_amarela/botao_de_pausa.png" 
            },
            "agua": {
                "label": "Beber água",
                "textoVisual": "VAMOS BEBER ÁGUA.",
                "audio": "audios/zona_amarela/agua.m4a",
                "imagem": "imagens/zona_amarela/beber.png" 
            },
            "contar": {
                "label": "Contar até 3",
                "textoVisual": "CONTE DEVAGARINHO... UM, DOIS, TRÊS...",
                "audio": "audios/zona_amarela/contar.m4a",
                "imagem": "imagens/zona_amarela/contar.png",
                "tempoEspera": 10000 
            }
        };

        function tocarAudio(caminhoArquivo) {
            if (audioAtual) {
                audioAtual.pause();
                audioAtual.currentTime = 0;
            }
            audioAtual = new Audio(caminhoArquivo);
            audioAtual.play().catch(erro => console.error("Erro no áudio:", erro));
        }

        function selecionarAcao(chave, botaoClicado) {
            const orientacao = orientacoes[chave];
            if (!orientacao) return;
            
            
            if (typeof registrarUsoEstrategia === 'function') {
                registrarUsoEstrategia(orientacao.label);
            }
            
            document.getElementById('titulo-principal').classList.add('titulo-oculto');
            document.getElementById('area-interativa').classList.add('modo-foco');
            
            document.querySelectorAll('.acao').forEach((botao) => {
                if (botao === botaoClicado) {
                    botao.classList.add('selecionado');
                } else {
                    botao.classList.add('oculto');
                }
            });
            
            document.getElementById('texto-feedback').textContent = orientacao.textoVisual;
            document.getElementById('gif-recompensa').src = orientacao.imagem;
            tocarAudio(orientacao.audio);
            
            const barra = document.getElementById('timer-barra');
            const tempoDaAcao = orientacao.tempoEspera || 8000;
            
            barra.style.transition = 'none';
            barra.style.width = '100%'; 
            
            setTimeout(() => {
                barra.style.transition = `width ${tempoDaAcao / 1000}s linear`; 
                barra.style.width = '0%'; 
            }, 50);
            
            timerReset = setTimeout(() => {
                window.location.assign('principal.html');
            }, tempoDaAcao); 
        }

        function acaoVoltar() {
            clearTimeout(timerReset); 
            if (audioAtual) audioAtual.pause(); 
            window.location.assign('principal.html');
        }
    </script>
</body>
</html>
